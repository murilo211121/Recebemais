  <!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>RecebeMais</title>
<!-- ZXing: melhor leitura QR em Android/coletores -->
<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0b0f18;
  --s1:#131c2b;
  --s2:#192334;
  --bd:#1d2e42;
  --cy:#00cff5;
  --gr:#00f09a;
  --wa:#f57c00;
  --re:#f03e5a;
  --tx:#ddeeff;
  --mu:#4e6e8a;
  --font:'IBM Plex Mono',monospace;
  --raj:'Rajdhani',sans-serif;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:var(--font);font-size:14px}

/* ══ PÁGINAS ══ */
.pg{position:fixed;inset:0;display:flex;flex-direction:column;
  background:var(--bg);transition:transform .28s cubic-bezier(.4,0,.2,1),opacity .28s;
  overflow:hidden}
.pg.hidden{transform:translateX(100%);opacity:0;pointer-events:none}
.pg.slide-left{transform:translateX(-8%);opacity:0;pointer-events:none}

/* ══ HEADER ══ */
.hdr{background:var(--s1);border-bottom:1px solid var(--bd);
  padding:11px 14px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;position:relative;z-index:10}
.hdr-back{background:none;border:none;color:var(--cy);font-family:var(--raj);
  font-weight:600;font-size:.75rem;letter-spacing:1px;padding:4px 6px 4px 0;cursor:pointer}
.logo{font-family:var(--raj);font-weight:700;font-size:1.3rem;
  color:var(--cy);letter-spacing:2px;text-transform:uppercase}
.logo b{color:var(--gr)}
.hdr-right{text-align:right}
#clock{font-size:.62rem;color:var(--cy);letter-spacing:1px}
#sess-pill{font-size:.55rem;color:var(--mu);margin-top:1px}
.pg-title{font-family:var(--raj);font-weight:700;font-size:1rem;
  color:var(--tx);letter-spacing:1px;text-transform:uppercase}

/* ══ SCROLL BODY ══ */
.pg-body{flex:1;overflow-y:auto;padding:12px;
  -webkit-overflow-scrolling:touch}
.pg-body::-webkit-scrollbar{width:2px}
.pg-body::-webkit-scrollbar-thumb{background:var(--bd)}

/* ══ CARDS ══ */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;
  padding:14px;margin-bottom:10px}
.card-title{font-family:var(--raj);font-weight:700;font-size:.65rem;
  letter-spacing:2px;text-transform:uppercase;color:var(--cy);margin-bottom:12px}

/* ══ DASHBOARD ══ */
.dash-head{padding:20px 12px 8px;text-align:center}
.dash-logo{font-family:var(--raj);font-weight:700;font-size:2rem;
  color:var(--cy);letter-spacing:4px;text-transform:uppercase}
.dash-logo b{color:var(--gr)}
.dash-sub{font-size:.6rem;color:var(--mu);letter-spacing:2px;margin-top:2px}
.dash-clock{font-size:1.1rem;color:var(--tx);font-family:var(--raj);font-weight:600;
  margin-top:6px;letter-spacing:2px}

.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px 12px}
.dash-btn{background:var(--s1);border:1px solid var(--bd);border-radius:12px;
  padding:18px 10px;display:flex;flex-direction:column;align-items:center;
  gap:8px;cursor:pointer;transition:border-color .2s,background .2s;
  text-decoration:none;border:1px solid var(--bd)}
.dash-btn:active{background:var(--s2);transform:scale(.97)}
.dash-btn.accent{border-color:var(--cy);background:rgba(0,207,245,.07)}
.dash-btn.green{border-color:var(--gr);background:rgba(0,240,154,.06)}
.dash-btn.warn{border-color:var(--wa);background:rgba(245,124,0,.06)}
.dash-icon{font-size:1.6rem;line-height:1}
.dash-lbl{font-family:var(--raj);font-weight:700;font-size:.8rem;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--tx);text-align:center}
.dash-sub2{font-size:.55rem;color:var(--mu);letter-spacing:.5px;text-align:center}

/* Status da sessão no dashboard */
.sess-status{margin:0 12px 10px;background:var(--s1);border:1px solid var(--bd);
  border-radius:10px;padding:12px;display:flex;align-items:center;gap:10px}
.sess-dot{width:8px;height:8px;border-radius:50%;background:var(--mu);flex-shrink:0}
.sess-dot.on{background:var(--gr);box-shadow:0 0 6px var(--gr)}
.sess-info{flex:1;min-width:0}
.sess-name{font-family:var(--raj);font-weight:700;font-size:.88rem;color:var(--tx);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sess-detail{font-size:.55rem;color:var(--mu);margin-top:1px}

/* Contadores no dashboard */
.dash-counters{display:flex;gap:8px;padding:0 12px 10px}
.dcnt{flex:1;background:var(--s1);border:1px solid var(--bd);border-radius:8px;
  padding:8px;text-align:center}
.dcnt .n{font-family:var(--raj);font-size:1.5rem;font-weight:700;color:var(--cy);line-height:1}
.dcnt .l{font-size:.5rem;color:var(--mu);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.dcnt.g .n{color:var(--gr)}
.dcnt.o .n{color:var(--wa)}

/* ══ FORMULÁRIO ══ */
label{display:block;font-size:.57rem;color:var(--mu);letter-spacing:1px;
  text-transform:uppercase;margin-bottom:3px}
input,select{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:6px;
  color:var(--tx);font-family:var(--font);font-size:.85rem;padding:10px 11px;
  outline:none;transition:border-color .2s;margin-bottom:9px;-webkit-appearance:none}
input:focus{border-color:var(--cy)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* ══ BOTÕES ══ */
.btn{width:100%;padding:12px;border-radius:8px;border:none;
  font-family:var(--raj);font-weight:700;font-size:.9rem;letter-spacing:2px;
  text-transform:uppercase;cursor:pointer;transition:opacity .15s,transform .1s;
  margin-bottom:8px;display:block;text-align:center}
.btn:active{transform:scale(.97);opacity:.85}
.btn:last-child{margin-bottom:0}
.btn-cy{background:var(--cy);color:#000}
.btn-gr{background:var(--gr);color:#000}
.btn-re{background:var(--re);color:#fff}
.btn-x{background:transparent;border:1px solid var(--bd);color:var(--mu)}
.btn-x:active{border-color:var(--cy);color:var(--cy)}
.btn-row{display:flex;gap:8px}
.btn-row .btn{margin-bottom:0;flex:1}

/* ══ CÂMERA / SCANNER ══ */
#cam-wrap{position:relative;width:100%;aspect-ratio:4/3;background:#000;
  border-radius:10px;overflow:hidden;margin-bottom:8px}
#vid{width:100%;height:100%;object-fit:cover;display:block}
.cam-ov{position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;pointer-events:none}
.scan-frame{width:62%;aspect-ratio:1;border-radius:8px;position:relative;
  box-shadow:0 0 0 9999px rgba(0,0,0,.52)}
.scan-frame::before{content:'';position:absolute;inset:-2px;border:2px solid var(--cy);
  border-radius:8px}
.scan-line{position:absolute;left:4px;right:4px;height:2px;
  background:linear-gradient(90deg,transparent,var(--cy),transparent);
  animation:sweep 1.7s ease-in-out infinite;top:0}
@keyframes sweep{0%{top:4px;opacity:1}88%{top:calc(100% - 6px);opacity:1}100%{top:calc(100% - 6px);opacity:0}}
.corner{position:absolute;width:18px;height:18px;border-color:var(--gr);border-style:solid}
.corner.tl{top:-2px;left:-2px;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.corner.tr{top:-2px;right:-2px;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.corner.bl{bottom:-2px;left:-2px;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.corner.br{bottom:-2px;right:-2px;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
#cam-reads{position:absolute;bottom:7px;right:10px;font-size:.52rem;
  color:rgba(0,207,245,.6);letter-spacing:1px;pointer-events:none}
.cam-ph{position:absolute;inset:0;background:var(--s2);display:flex;
  flex-direction:column;align-items:center;justify-content:center;gap:8px}
.cam-ph.off{display:none}
.cam-ph-icon{font-size:2.5rem;opacity:.15}
.cam-ph-txt{font-size:.58rem;color:var(--mu);letter-spacing:.5px}
#cam-status{font-size:.65rem;text-align:center;padding:3px 0;min-height:20px;letter-spacing:.3px}
#cam-status.ok{color:var(--gr)}
#cam-status.err{color:var(--re)}
#cam-status.warn{color:var(--wa)}

/* ══ QR RESULT ══ */
.qr-result{display:none;background:var(--s2);border:1px solid var(--gr);
  border-radius:10px;padding:13px;margin-top:6px}
.qr-result.on{display:block}
.rrow{display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;border-bottom:1px solid var(--bd);font-size:.72rem}
.rrow:last-of-type{border:none}
.rk{color:var(--mu);font-size:.56rem;letter-spacing:1px;text-transform:uppercase}
.rv{color:var(--tx);font-weight:500}
.rv.big{font-size:1.3rem;color:var(--gr);font-family:var(--raj);font-weight:700}
.rv.acc{font-size:1.1rem;color:var(--wa);font-family:var(--raj);font-weight:700}
.rv.ref{color:var(--cy);font-family:var(--raj);font-weight:700;font-size:1rem}
.accum-alert{display:none;background:rgba(245,124,0,.08);border:1px solid rgba(245,124,0,.3);
  border-radius:5px;padding:7px 9px;font-size:.62rem;color:var(--wa);line-height:1.7;margin-bottom:8px}
.accum-alert.on{display:block}

/* ══ LISTA ITENS ══ */
.ilist{display:flex;flex-direction:column;gap:7px}
.icard{background:var(--s1);border:1px solid var(--bd);border-radius:9px;
  padding:11px 13px;display:flex;align-items:center;gap:10px;animation:fin .18s ease}
@keyframes fin{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.icard.multi{border-color:rgba(0,240,154,.3)}
.iref{font-family:var(--raj);font-size:1rem;font-weight:700}
.iqty{font-family:var(--raj);font-size:1.3rem;font-weight:700;color:var(--gr);
  min-width:52px;text-align:right}
.itag{font-size:.5rem;color:var(--wa);background:rgba(245,124,0,.1);
  border-radius:3px;padding:1px 5px;display:inline-block;margin-top:2px;letter-spacing:.5px}
.imeta{font-size:.56rem;color:var(--mu);margin-top:1px}
.idel{background:none;border:none;color:var(--re);cursor:pointer;
  font-size:.75rem;padding:5px;opacity:.6}
.idel:active{opacity:1}

/* ══ STATS BAR ══ */
.stats{display:flex;gap:7px;margin-bottom:10px}
.stat{flex:1;background:var(--s1);border:1px solid var(--bd);border-radius:8px;
  padding:9px;text-align:center}
.stat .n{font-family:var(--raj);font-size:1.7rem;font-weight:700;color:var(--cy);line-height:1}
.stat .l{font-size:.52rem;color:var(--mu);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.stat.g .n{color:var(--gr)}
.stat.o .n{color:var(--wa)}

/* ══ EXPORT ══ */
.exbox{background:var(--bg);border:1px solid var(--bd);border-radius:6px;
  padding:10px;font-size:.62rem;color:var(--mu);white-space:pre;
  overflow-x:auto;max-height:180px;margin-bottom:8px;line-height:1.9}

/* ══ FORNECEDORES ══ */
.forn-card{background:var(--s1);border:1px solid var(--bd);border-radius:9px;
  padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:7px;cursor:pointer}
.forn-card:active{background:var(--s2)}
.forn-dot{width:10px;height:10px;border-radius:50%;background:var(--cy);flex-shrink:0}
.forn-dot.lp{background:var(--gr)}
.forn-name{font-family:var(--raj);font-weight:700;font-size:.95rem;flex:1}
.forn-meta{font-size:.55rem;color:var(--mu);margin-top:2px}
.forn-badge{font-family:var(--raj);font-size:.65rem;font-weight:700;
  color:var(--cy);letter-spacing:1px}

.info-box{background:rgba(0,207,245,.04);border:1px solid rgba(0,207,245,.15);
  border-radius:6px;padding:9px 11px;font-size:.62rem;color:var(--mu);
  line-height:1.85;margin-bottom:8px}
.info-box b{color:var(--cy)}
.info-box code{color:var(--tx);background:rgba(255,255,255,.05);
  padding:1px 4px;border-radius:3px;font-size:.6rem}

/* ══ EMPTY ══ */
.empty{text-align:center;padding:40px 20px;color:var(--mu)}
.e-ico{letter-spacing:6px;opacity:.15;margin-bottom:10px;font-size:.85rem}
.e-txt{font-size:.68rem;letter-spacing:1px}

/* ══ WARN BOX ══ */
.wbox{display:none;padding:8px 10px;background:rgba(240,62,90,.07);
  border:1px solid rgba(240,62,90,.3);border-radius:6px;
  font-size:.64rem;color:var(--re);margin-bottom:9px;line-height:1.6}
.wbox.on{display:block}

/* ══ TOAST ══ */
#toast{position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(60px);
  background:var(--s2);border:1px solid var(--gr);color:var(--gr);
  padding:9px 20px;border-radius:20px;font-size:.68rem;letter-spacing:.5px;
  z-index:9999;transition:transform .25s;white-space:nowrap;max-width:90vw;
  overflow:hidden;text-overflow:ellipsis}
#toast.on{transform:translateX(-50%) translateY(0)}
#toast.err{border-color:var(--re);color:var(--re)}

/* ══ FLASH ══ */
#flash{position:fixed;inset:0;background:rgba(0,240,154,.09);
  pointer-events:none;z-index:9990;opacity:0;transition:opacity .12s}
#flash.on{opacity:1}

/* ══ MODAL ══ */
.mdl-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);
  z-index:800;align-items:center;justify-content:center;padding:16px}
.mdl-bg.on{display:flex}
.mdl{background:var(--s1);border:1px solid var(--bd);border-radius:12px;
  padding:20px;width:100%;max-width:360px}
.mdl h3{font-family:var(--raj);font-weight:700;font-size:.88rem;color:var(--cy);
  letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.mdl p{font-size:.7rem;color:var(--mu);line-height:1.7}
.mdl-btns{display:flex;gap:8px;margin-top:14px}
.mdl-btns .btn{margin-bottom:0;flex:1}
</style>
</head>
<body>

<div id="flash"></div>
<div id="toast"></div>

<!-- ══════════════════════════════════════
     MODAL CONFIRMAÇÃO
══════════════════════════════════════ -->
<div class="mdl-bg" id="mdl-bg">
  <div class="mdl">
    <h3 id="mdl-title"></h3>
    <p id="mdl-msg"></p>
    <div class="mdl-btns">
      <button class="btn btn-x" onclick="mdlClose()">Cancelar</button>
      <button class="btn btn-re" id="mdl-ok">Confirmar</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     PG 0 — DASHBOARD
══════════════════════════════════════ -->
<div class="pg" id="pg-dash">
  <div class="dash-head">
    <div class="dash-logo">Recebe<b>+</b></div>
    <div class="dash-sub">Sistema de Recebimento</div>
    <div class="dash-clock" id="dash-clock">--:--:--</div>
  </div>

  <!-- Status sessão -->
  <div class="sess-status" id="dash-sess-status">
    <div class="sess-dot" id="dash-dot"></div>
    <div class="sess-info">
      <div class="sess-name" id="dash-sess-name">Nenhuma sessão ativa</div>
      <div class="sess-detail" id="dash-sess-detail">Inicie uma nova sessão para começar</div>
    </div>
  </div>

  <!-- Contadores -->
  <div class="dash-counters">
    <div class="dcnt"><div class="n" id="d-refs">0</div><div class="l">Refs</div></div>
    <div class="dcnt g"><div class="n" id="d-cxas">0</div><div class="l">Caixas</div></div>
    <div class="dcnt o"><div class="n" id="d-scans">0</div><div class="l">Scans</div></div>
  </div>

  <!-- Botões de navegação -->
  <div class="dash-grid">
    <button class="dash-btn accent" onclick="goPage('pg-scanner')">
      <div class="dash-icon">&#9654;</div>
      <div class="dash-lbl">Iniciar Contagem</div>
      <div class="dash-sub2">Escanear etiquetas</div>
    </button>
    <button class="dash-btn" onclick="goPage('pg-fornecedores')">
      <div class="dash-icon">&#9776;</div>
      <div class="dash-lbl">Fornecedores</div>
      <div class="dash-sub2">Gerenciar padrões</div>
    </button>
    <button class="dash-btn green" onclick="goPage('pg-lista')">
      <div class="dash-icon">&#9783;</div>
      <div class="dash-lbl">Contagens</div>
      <div class="dash-sub2">Itens registrados</div>
    </button>
    <button class="dash-btn warn" onclick="goPage('pg-resumo')">
      <div class="dash-icon">&#9636;</div>
      <div class="dash-lbl">Resumo</div>
      <div class="dash-sub2">Exportar dados</div>
    </button>
  </div>
</div>

<!-- ══════════════════════════════════════
     PG 1 — SCANNER / SESSÃO
══════════════════════════════════════ -->
<div class="pg hidden" id="pg-scanner">
  <div class="hdr">
    <button class="hdr-back" onclick="goBack()">&#8592; Voltar</button>
    <div class="pg-title">Contagem</div>
    <div id="lp-pill" style="display:none;font-size:.5rem;background:rgba(0,207,245,.1);
      border:1px solid rgba(0,207,245,.3);color:var(--cy);padding:1px 6px;
      border-radius:2px;letter-spacing:1.5px">LINKPLAS</div>
  </div>
  <div class="pg-body" id="scan-body">

    <!-- Sessão -->
    <div class="card" id="card-sessao">
      <div class="card-title">Nova Sessão</div>
      <label>Fornecedor</label>
      <input id="inp-forn" type="text" placeholder="Ex: LINKPLAS" autocomplete="off" autocorrect="off" autocapitalize="characters">
      <label>NF / Pedido (opcional)</label>
      <input id="inp-nf" type="text" placeholder="Ex: NF-001234">
      <button class="btn btn-cy" onclick="sessStart()">Iniciar Sessão</button>
    </div>

    <!-- Câmera -->
    <div class="card" id="card-cam" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="card-title" style="margin-bottom:0">Leitura QR</div>
        <div id="sess-tag" style="font-size:.58rem;color:var(--gr);font-family:var(--raj);font-weight:600"></div>
      </div>

      <div id="cam-wrap">
        <video id="vid" autoplay muted playsinline webkit-playsinline></video>
        <div class="cam-ov">
          <div class="scan-frame">
            <div class="scan-line"></div>
            <div class="corner tl"></div><div class="corner tr"></div>
            <div class="corner bl"></div><div class="corner br"></div>
          </div>
        </div>
        <div id="cam-reads"></div>
        <div class="cam-ph" id="cam-ph">
          <div class="cam-ph-icon">[ ]</div>
          <div class="cam-ph-txt">Toque em Abrir Câmera</div>
        </div>
      </div>

      <div id="cam-status"></div>

      <div class="btn-row" style="margin-bottom:8px">
        <button class="btn btn-cy" id="btn-open"  onclick="camStart()">Abrir Câmera</button>
        <button class="btn btn-x"  id="btn-close" onclick="camStop()" style="display:none;flex:.5">Fechar</button>
        <button class="btn btn-x"  id="btn-torch" onclick="torchToggle()" style="display:none;flex:.5;font-size:.75rem">Luz</button>
      </div>

      <!-- Resultado QR -->
      <div class="qr-result" id="qr-box">
        <div class="accum-alert" id="accum-bar"></div>
        <div class="rrow"><span class="rk">Referência</span><span class="rv ref" id="r-ref">—</span></div>
        <div class="rrow"><span class="rk">Qtd. desta leitura</span><span class="rv big" id="r-qty">—</span></div>
        <div class="rrow" id="r-acc-row" style="display:none">
          <span class="rk">Total acumulado</span><span class="rv acc" id="r-acc">—</span>
        </div>
        <div class="rrow"><span class="rk">Fornecedor</span><span class="rv" id="r-forn">—</span></div>
        <div class="rrow">
          <span class="rk">Dado bruto</span>
          <span class="rv" id="r-raw" style="font-size:.54rem;color:var(--mu);text-align:right;max-width:58%;word-break:break-all">—</span>
        </div>
        <div class="btn-row" style="margin-top:10px">
          <button class="btn btn-gr" onclick="itemConfirm()">Confirmar</button>
          <button class="btn btn-x"  onclick="itemCancel()">Cancelar</button>
        </div>
      </div>
    </div>

    <!-- Entrada manual -->
    <div class="card" id="card-manual" style="display:none">
      <div class="card-title">Entrada Manual</div>
